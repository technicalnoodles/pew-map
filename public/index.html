<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pew Map - Live Network Connections</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>🌍 Pew Map - Live Network Connections</h1>
      <p class="subtitle">Real-time visualization of network traffic across the globe</p>
    </header>

    <div class="controls">
      <div class="control-group">
        <label for="source-select">Data Source:</label>
        <select id="source-select">
          <option value="live">Live Capture</option>
          <option value="file">PCAP File</option>
        </select>
      </div>

      <div class="control-group" id="interface-group">
        <label for="interface-select">Network Interface:</label>
        <select id="interface-select">
          <option value="">Loading...</option>
        </select>
      </div>

      <div class="control-group hidden" id="file-group">
        <label for="pcap-file">PCAP File Path:</label>
        <input type="text" id="pcap-file" placeholder="/path/to/capture.pcap">
      </div>

      <div class="control-group">
        <label for="animation-duration">Animation Duration (ms):</label>
        <input type="number" id="animation-duration" value="2000" min="500" max="10000" step="100">
      </div>

      <div class="control-group">
        <button id="start-btn" class="btn btn-primary">Start Capture</button>
        <button id="stop-btn" class="btn btn-danger" disabled>Stop Capture</button>
      </div>
    </div>

    <div class="stats">
      <div class="stat-card">
        <div class="stat-value" id="total-connections">0</div>
        <div class="stat-label">Total Connections</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="active-connections">0</div>
        <div class="stat-label">Active Lines</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="countries-count">0</div>
        <div class="stat-label">Countries</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="connection-rate">0/s</div>
        <div class="stat-label">Rate</div>
      </div>
    </div>

    <div id="map-container"></div>

    <div class="connection-feed">
      <h3>Recent Connections</h3>
      <div id="feed-list"></div>
    </div>

    <footer>
      <p>⚠️ Requires root/admin privileges for live packet capture</p>
    </footer>
  </div>

  <script src="https://code.highcharts.com/maps/highmaps.js"></script>
  <script src="https://code.highcharts.com/maps/modules/exporting.js"></script>
  <script src="https://code.highcharts.com/mapdata/custom/world.js"></script>
  <script src="map-visualizer.js"></script>
</body>
</html>
